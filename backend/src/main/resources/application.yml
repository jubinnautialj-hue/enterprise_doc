server:
  port: 8020
  servlet:
    context-path: /api

spring:
  application:
    name: enterprise-doc-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/enterprise_doc?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password: jingneng2023.
      database: 0
      timeout: 10s
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.doc.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: enterprise-doc-system-jwt-secret-key-2024-very-long-key-for-security
  expiration: 86400000
  header: Authorization
  prefix: Bearer

file:
  upload:
    path: ./uploads
  minio:
    endpoint: http://10.10.5.44:9000
    access-key: miniominio
    secret-key: miniominio
    bucket-name: enterprise-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
